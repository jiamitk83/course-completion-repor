<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Status - Course Completion Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
        }
        h1 {
            text-align: center;
        }
        nav {
            background-color: #f2f2f2;
            padding: 10px;
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 20px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        nav a:hover {
            color: #007bff;
        }
        .filters {
            margin-bottom: 20px;
        }
        select, input, button {
            padding: 8px;
            margin-right: 10px;
        }
        table, th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="subject-management.html">Subject Management</a>
        <a href="class-management.html">Class Management</a>
        <a href="chapter-management.html">Chapter Management</a>
    </nav>
    <h1>Current Status</h1>
    <div class="filters">
        <label>Class:</label>
        <select id="class-select" aria-label="Select Class">
            <option value="">Select Class</option>
        </select>
        <label>Subject:</label>
        <select id="subject-select" disabled aria-label="Select Subject">
            <option value="">Select Subject</option>
        </select>
    </div>
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="fas fa-table"></i> Current Status</h5>
        <button class="btn btn-success" id="generate-pdf-btn"><i class="fas fa-file-pdf"></i> Generate PDF Report</button>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover" id="status-table" style="display: none;">
                <thead class="table-dark">
                    <tr>
                        <th><i class="fas fa-hashtag"></i> Chapter No.</th>
                        <th><i class="fas fa-file-alt"></i> Chapter Name</th>
                        <th><i class="fas fa-check"></i> Chapter Completion</th>
                        <th><i class="fas fa-book"></i> Notebook Completion</th>
                        <th><i class="fas fa-clipboard"></i> Worksheet Completed</th>
                        <th><i class="fas fa-cogs"></i> Actions</th>
                    </tr>
                </thead>
                <tbody id="status-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

    <script>
        const classSelect = document.getElementById('class-select');
        const subjectSelect = document.getElementById('subject-select');
        const statusTable = document.getElementById('status-table');
        const statusTbody = document.getElementById('status-tbody');

        // Load data
        let classes = [];
        let subjects = [];
        let statusData = {};

        async function populateClasses() {
            try {
                const response = await fetch('/api/classes');
                classes = await response.json();
                classSelect.innerHTML = '<option value="">Select Class</option>';
                classes.forEach(cls => {
                    const option = document.createElement('option');
                    option.value = cls;
                    option.textContent = cls;
                    classSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading classes:', error);
            }
        }

        async function populateSubjects() {
            try {
                const response = await fetch('/api/subjects');
                subjects = await response.json();
                subjectSelect.innerHTML = '<option value="">Select Subject</option>';
                subjects.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub;
                    option.textContent = sub;
                    subjectSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading subjects:', error);
            }
        }

        async function renderStatus() {
            const selectedClass = classSelect.value;
            const selectedSubject = subjectSelect.value;
            statusTbody.innerHTML = '';
            if (selectedClass && selectedSubject) {
                try {
                    const [chaptersResponse, statusResponse] = await Promise.all([
                        fetch(`/api/chapters/${selectedClass}/${selectedSubject}`),
                        fetch(`/api/status/${selectedClass}/${selectedSubject}`)
                    ]);
                    const chapterList = await chaptersResponse.json();
                    statusData = await statusResponse.json();
                    statusTable.style.display = 'table';
                    chapterList.forEach((chapter) => {
                        const currentStatus = statusData[chapter.chapterNumber] || { chapterCompleted: false, notebookCompleted: false, worksheetCompleted: false };
                        const tr = document.createElement('tr');
                        tr.setAttribute('data-chapter', JSON.stringify(chapter));
                        tr.innerHTML = `
                            <td>${chapter.chapterNumber}</td>
                            <td>${chapter.name}</td>
                            <td><input type="checkbox" class="status-checkbox" data-type="chapterCompleted" data-chapter="${chapter.chapterNumber}" ${currentStatus.chapterCompleted ? 'checked' : ''}></td>
                            <td><input type="checkbox" class="status-checkbox" data-type="notebookCompleted" data-chapter="${chapter.chapterNumber}" ${currentStatus.notebookCompleted ? 'checked' : ''}></td>
                            <td><input type="checkbox" class="status-checkbox" data-type="worksheetCompleted" data-chapter="${chapter.chapterNumber}" ${currentStatus.worksheetCompleted ? 'checked' : ''}></td>
                            <td>
                                <button class="btn btn-sm btn-success me-1 save-btn" data-chapter="${chapter.chapterNumber}"><i class="fas fa-save"></i> Save</button>
                                <button class="btn btn-sm btn-primary me-1 edit-btn" data-chapter="${chapter.chapterNumber}"><i class="fas fa-edit"></i> Edit</button>
                                <button class="btn btn-sm btn-danger delete-btn" data-chapter="${chapter.chapterNumber}"><i class="fas fa-trash"></i> Delete</button>
                            </td>
                        `;
                        statusTbody.appendChild(tr);
                    });
                } catch (error) {
                    console.error('Error loading status:', error);
                    statusTable.style.display = 'none';
                }
            } else {
                statusTable.style.display = 'none';
            }
        }


        classSelect.addEventListener('change', () => {
            subjectSelect.disabled = !classSelect.value;
            if (!classSelect.value) {
                subjectSelect.value = '';
            }
            renderStatus();
        });

        subjectSelect.addEventListener('change', () => {
            renderStatus();
        });

        statusTable.addEventListener('click', async (e) => {
            const selectedClass = classSelect.value;
            const selectedSubject = subjectSelect.value;
            const chapterNumber = e.target.dataset.chapter;
            if (e.target.classList.contains('save-btn')) {
                const tr = e.target.closest('tr');
                const checkboxes = tr.querySelectorAll('.status-checkbox');
                const current = {
                    chapterCompleted: checkboxes[0].checked,
                    notebookCompleted: checkboxes[1].checked,
                    worksheetCompleted: checkboxes[2].checked
                };
                try {
                    await fetch(`/api/status/${selectedClass}/${selectedSubject}/${chapterNumber}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(current)
                    });
                    alert('Status saved successfully!');
                } catch (error) {
                    console.error('Error saving status:', error);
                }
            } else if (e.target.classList.contains('edit-btn')) {
                const tr = e.target.closest('tr');
                const tds = tr.querySelectorAll('td');
                const chapter = JSON.parse(tr.getAttribute('data-chapter'));
                // Make chapter number and name editable
                tds[0].innerHTML = `<input type="number" class="form-control form-control-sm" value="${chapter.chapterNumber}">`;
                tds[1].innerHTML = `<input type="text" class="form-control form-control-sm" value="${chapter.name}">`;
                e.target.innerHTML = '<i class="fas fa-check"></i> Done';
                e.target.classList.remove('edit-btn');
                e.target.classList.add('done-btn');
                e.target.classList.remove('btn-primary');
                e.target.classList.add('btn-warning');
            } else if (e.target.classList.contains('done-btn')) {
                const tr = e.target.closest('tr');
                const inputs = tr.querySelectorAll('input[type="number"], input[type="text"]');
                const newNumber = parseInt(inputs[0].value);
                const newName = inputs[1].value.trim();
                if (newNumber && newName) {
                    // Update chapter in database
                    const chapter = JSON.parse(tr.getAttribute('data-chapter'));
                    try {
                        await fetch(`/api/chapters/${chapter._id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chapterNumber: newNumber, name: newName, startMonth: chapter.startMonth, endMonth: chapter.endMonth, className: selectedClass, subjectName: selectedSubject })
                        });
                        renderStatus(); // Re-render to show updated data
                    } catch (error) {
                        console.error('Error updating chapter:', error);
                    }
                }
            } else if (e.target.classList.contains('delete-btn')) {
                if (confirm('Are you sure you want to delete this status?')) {
                    try {
                        await fetch(`/api/status/${selectedClass}/${selectedSubject}/${chapterNumber}`, {
                            method: 'DELETE'
                        });
                        renderStatus(); // Re-render
                    } catch (error) {
                        console.error('Error deleting status:', error);
                    }
                }
            }
        });

        document.getElementById('generate-pdf-btn').addEventListener('click', generatePDF);

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const selectedClass = classSelect.value;
            const selectedSubject = subjectSelect.value;
            if (!selectedClass || !selectedSubject) {
                alert('Please select a class and subject first.');
                return;
            }
            doc.text(`Status Report - Class: ${selectedClass}, Subject: ${selectedSubject}`, 14, 20);
            const tableData = [];
            const rows = statusTbody.querySelectorAll('tr');
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                const rowData = [
                    cells[0].textContent,
                    cells[1].textContent,
                    cells[2].querySelector('input').checked ? 'Yes' : 'No',
                    cells[3].querySelector('input').checked ? 'Yes' : 'No',
                    cells[4].querySelector('input').checked ? 'Yes' : 'No'
                ];
                tableData.push(rowData);
            });
            doc.autoTable({
                head: [['Chapter No.', 'Chapter Name', 'Chapter Completion', 'Notebook Completion', 'Worksheet Completed']],
                body: tableData,
                startY: 30
            });
            doc.save(`status-report-${selectedClass}-${selectedSubject}.pdf`);
        }

        // Initialize
        populateClasses();
        populateSubjects();
    </script>
</body>
</html>
